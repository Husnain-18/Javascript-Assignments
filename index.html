<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Assignment 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar bg-custom-dark py-2">
        <div class="container-fluid px-5 d-flex align-items-center">
            <div class="d-flex align-items-baseline">
                <span class="text-white fs-5 me-3">Assignments</span>
                <span class="text-white-50 small">Chapter 15 - 20</span>
            </div>
            <div class="d-flex gap-2">
                <input class="search-input" type="text" placeholder="Search">
                <button class="search-btn" type="button">Search</button>
            </div>
        </div>
    </nav>

    <div class="main-content-wrapper py-5">
        <div class="container">
            
            <h2 class="text-center mb-5 text-dark">
                Chapter # 1 - 7 | Introduction to JavaScript | Data Types | Alert | Arithmetic Operators
            </h2>
<hr><br>
            <div class="card custom-card mb-5">
                <div class="card-body p-4">
                    <div class="button-container">
                        <button class="btn btn-danger" id="alertname">Alert Name</button>
                        <button class="btn btn-danger" id="alertnumber">Alert Number</button>
                        <button class="btn btn-danger" id="showvariable">Show Variable Names</button>
                        <button class="btn btn-danger" id="showcamel">Show camelCase Examples</button>
                        <button class="btn btn-danger" id="sum2number">Sum 2 Numbers</button>
                        <button class="btn btn-danger" id="subtract2number">Subtract 2 Numbers</button>
                        <button class="btn btn-danger" id="multiply2number">Multiply 2 Numbers</button>
                        <button class="btn btn-danger" id="divide2number">Divide 2 Numbers</button>
                        <button class="btn btn-danger" id="calculatenumber">Calculate Some Numbers</button>
                    </div>
                </div>
            </div>
<br>
            <div class="mb-5">
                <h3 class="text-center mb-3">Original Statement</h3>
                <div class="form-control custom-input mb-3" style="height: auto; min-height: 60px; word-break: break-word;" >
                    <p class="text-center" id="statement"></p>
                </div>
                <div class="text-center" >
                    <button class="btn btn-clear" id="clearstatement">Clear Statement</button>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-center mb-3">Output / Result</h3>
                <div class="form-control custom-input mb-3" style="height: auto; min-height: 60px; word-break: break-word;" >
                    <p class="text-center" id="outputresult"></p>
                </div>
                <div class="text-center">
                    <button class="btn btn-clear" id="clearoutput">Clear Output</button>
                </div>
            </div>
        </div>
    </div>

     <footer class="bg-custom-dark text-center py-2 text-white mt-auto">
        <small class="opacity-75">&copy; 2026. Assignment 1 By <strong>Husnain Razzaq</strong></small>
    </footer>

    <script src="script.js"></script>
</body>
</html>
